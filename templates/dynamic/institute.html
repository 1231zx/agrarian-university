{% extends "base.html" %}

{% block title %}{{ page.title }} - Красноярский ГАУ{% endblock %}

{% block content %}
<div class="container page-content">
    <!-- Выводим контент из базы данных (в нём уже есть заголовки и всё оформление) -->
    {{ page.content|safe }}
    
    {% if children %}
        <h2>📚 Кафедры института</h2>
        <div class="departments-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-top: 1.5rem;">
            {% for dept in children %}
                <div class="department-card" style="background: var(--beige-light); border-radius: 12px; padding: 1rem; border: 1px solid var(--beige-medium);">
                    <h3 style="margin: 0 0 0.5rem 0;">{{ dept.title }}</h3>
                    <a href="{{ url_for('dynamic_page', slug=dept.slug) }}" class="more-link" style="color: var(--accent-color); text-decoration: none;">Подробнее →</a>
                </div>
            {% endfor %}
        </div>
    {% endif %}
    
    <div style="margin-top: 2rem;">
        <a href="{{ url_for('institutes_page') }}" class="btn btn-secondary">← Назад к институтам</a>
    </div>
</div>
{% endblock %}
