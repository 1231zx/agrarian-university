{% extends "base.html" %}

{% block title %}{{ page.title }} - Красноярский ГАУ{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>{{ page.title }}</h1>
    </div>
</section>

<section class="page-content">
    <div class="container">
        <div class="content-block">
            {{ page.content|safe }}
        </div>
        
        {% if page.parent %}
            <div style="margin-top: 2rem;">
                <a href="{{ url_for('dynamic_page', slug=page.parent.slug) }}" class="btn btn-secondary">
                    ← Назад в {{ page.parent.title }}
                </a>
            </div>
        {% endif %}
    </div>
</section>
{% endblock %}
