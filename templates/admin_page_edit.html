{% extends "base.html" %}

{% block title %}Редактирование: {{ page.title }}{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Редактирование: {{ page.title }}</h1>
    </div>
</section>

<div class="container">
    <div class="content-block">
        <form method="POST">
            <div class="form-group">
                <label>Название</label>
                <input type="text" name="title" value="{{ page.title }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Meta-описание</label>
                <input type="text" name="meta_description" value="{{ page.meta_description or '' }}" class="form-control">
            </div>
            <div class="form-group">
                <label>Содержание (HTML)</label>
                <textarea name="content" rows="15" class="form-control" required>{{ page.content }}</textarea>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="published" {% if page.published %}checked{% endif %}> Опубликовать
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('admin_pages') }}" class="btn btn-secondary">Назад</a>
        </form>
    </div>
</div>
{% endblock %}
