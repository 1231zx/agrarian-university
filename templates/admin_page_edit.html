{% extends "base.html" %}

{% block title %}Редактирование: {{ page.title }}{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Редактирование: {{ page.title }}</h1>
    </div>
</section>

<div class="container" style="margin-top: 2rem; margin-bottom: 2rem;">
    <div class="content-block" style="max-width: 100%; overflow-x: auto;">
        <form method="POST">
            <div class="form-group">
                <label>Название</label>
                <input type="text" name="title" value="{{ page.title }}" class="form-control" style="width: 100%; padding: 12px;" required>
            </div>
            
            <div class="form-group">
                <label>Meta-описание</label>
                <input type="text" name="meta_description" value="{{ page.meta_description or '' }}" class="form-control" style="width: 100%; padding: 12px;">
            </div>
            
            <div class="form-group">
                <label>Содержание (HTML)</label>
                <textarea name="content" rows="20" class="form-control" style="width: 100%; font-family: monospace; font-size: 14px;" required>{{ page.content }}</textarea>
                <small style="color: #666;">Поддерживается HTML. Используйте теги: h2, h3, p, ul, li, strong, em, a href</small>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" name="published" {% if page.published %}checked{% endif %}> 
                    <span>Опубликовать</span>
                </label>
            </div>
            
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                <a href="{{ url_for('admin_pages') }}" class="btn btn-secondary">← Назад к списку</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-control {
        border: 2px solid var(--beige-medium);
        border-radius: 10px;
        transition: all 0.3s;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    textarea.form-control {
        resize: vertical;
    }
    @media (max-width: 768px) {
        .content-block {
            padding: 1rem;
        }
        textarea.form-control {
            font-size: 12px;
        }
    }
</style>
{% endblock %}
